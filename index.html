<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Numble</title>
    <style>
      :root {
        --bg: #121213;
        --tile: #3a3a3c;
        --text: #ffffff;
        --green: #538d4e;
        --yellow: #b59f3b;
        --gray: #3a3a3c;
        --border: #565758;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .app {
        width: min(520px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.6rem;
        letter-spacing: 0.04em;
      }

      .board {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
      }

      .tile {
        aspect-ratio: 1 / 1;
        border: 2px solid var(--border);
        display: grid;
        place-items: center;
        font-size: 1.5rem;
        font-weight: 700;
        border-radius: 4px;
        background: #121213;
        user-select: none;
      }

      .tile.filled {
        border-color: #878a8c;
      }

      .tile.green {
        background: var(--green);
        border-color: var(--green);
      }

      .tile.yellow {
        background: var(--yellow);
        border-color: var(--yellow);
      }

      .tile.gray {
        background: var(--gray);
        border-color: var(--gray);
      }

      .controls {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      input {
        width: 220px;
        padding: 10px 12px;
        font-size: 1rem;
        border-radius: 6px;
        border: 1px solid #666;
        outline: none;
        text-align: center;
        letter-spacing: 0.08em;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      button {
        padding: 10px 14px;
        border: none;
        border-radius: 6px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: #2563eb;
        color: white;
      }

      button.secondary {
        background: #444;
        color: #fff;
      }

      .message {
        min-height: 24px;
        font-weight: 600;
        margin-top: 6px;
      }

      .share {
        margin-top: 10px;
        display: none;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .modal[hidden] {
        display: none;
      }

      .modal-card {
        width: min(420px, 100%);
        background: #1f2023;
        border: 1px solid #3e3f42;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }

      .modal-card h2 {
        margin: 0 0 10px;
      }

      .modal-result {
        margin: 0 0 10px;
        font-weight: 600;
      }

      .modal-share-status {
        min-height: 20px;
        margin: 8px 0 0;
        font-size: 0.9rem;
        opacity: 0.9;
      }

      .modal-actions {
        margin-top: 12px;
      }

      .legend {
        margin-top: 14px;
        opacity: 0.85;
        font-size: 0.92rem;
      }

      .dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 2px;
        margin: 0 5px -1px 12px;
      }

      .dot:first-child {
        margin-left: 0;
      }

      .dot.green {
        background: var(--green);
      }

      .dot.yellow {
        background: var(--yellow);
      }

      .dot.gray {
        background: var(--gray);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Numble</h1>
      <p>Guess the 7-digit number in 6 tries or less</p>
      <div id="board" class="board"></div>

      <div class="controls">
        <input
          id="guessInput"
          inputmode="numeric"
          maxlength="7"
          placeholder="Enter 7 digits"
        />
        <button id="submitBtn" class="primary">Guess</button>
      </div>

      <div id="message" class="message"></div>

      <div class="legend">
        <span class="dot green"></span> correct digit + position
        <span class="dot yellow"></span> digit exists, wrong position
        <span class="dot gray"></span> digit not in answer
      </div>
    </div>

    <div id="resultModal" class="modal" hidden>
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="resultTitle"
      >
        <h2 id="resultTitle">Game Over</h2>
        <p id="resultText" class="modal-result"></p>
        <div id="shareActions" class="share">
          <button id="shareRedditBtn" class="secondary">Share on Reddit</button>
          <button id="shareBlueskyBtn" class="secondary">
            Share on Bluesky
          </button>
          <button id="shareTwitterBtn" class="secondary">
            Share on Twitter
          </button>
          <button id="copyShareBtn" class="secondary">Copy result</button>
        </div>
        <p id="modalShareStatus" class="modal-share-status"></p>
        <div class="modal-actions">
          <button id="newBtn" class="primary">New Game</button>
        </div>
      </div>
    </div>

    <script>
      const DIGITS = 7;
      const MAX_GUESSES = 6;

      const boardEl = document.getElementById("board");
      const inputEl = document.getElementById("guessInput");
      const submitBtn = document.getElementById("submitBtn");
      const newBtn = document.getElementById("newBtn");
      const messageEl = document.getElementById("message");
      const resultModalEl = document.getElementById("resultModal");
      const resultTitleEl = document.getElementById("resultTitle");
      const resultTextEl = document.getElementById("resultText");
      const shareActionsEl = document.getElementById("shareActions");
      const shareRedditBtn = document.getElementById("shareRedditBtn");
      const shareBlueskyBtn = document.getElementById("shareBlueskyBtn");
      const shareTwitterBtn = document.getElementById("shareTwitterBtn");
      const copyShareBtn = document.getElementById("copyShareBtn");
      const modalShareStatusEl = document.getElementById("modalShareStatus");

      let secret = "";
      let guesses = [];
      let gameOver = false;

      function randomDigitString(length) {
        // Leading zeros are valid.
        let output = "";
        for (let i = 0; i < length; i += 1) {
          output += Math.floor(Math.random() * 10);
        }
        return output;
      }

      function setMessage(msg) {
        messageEl.textContent = msg;
      }

      function getShareMessage() {
        return `I guessed "${secret}" in ${guesses.length}/6 tries! Think you can beat me? ${window.location.origin}`;
      }

      function setShareVisible(isVisible) {
        shareActionsEl.style.display = isVisible ? "flex" : "none";
      }

      function showResultModal({ title, resultText, showShare }) {
        resultTitleEl.textContent = title;
        resultTextEl.textContent = resultText;
        modalShareStatusEl.textContent = "";
        setShareVisible(showShare);
        resultModalEl.hidden = false;
      }

      function hideResultModal() {
        resultModalEl.hidden = true;
      }

      function initGame() {
        secret = randomDigitString(DIGITS);
        console.log({ secret });
        guesses = [];
        gameOver = false;
        inputEl.value = "";
        inputEl.disabled = false;
        submitBtn.disabled = false;
        hideResultModal();
        setShareVisible(false);
        setMessage("Guess the 7-digit number.");
        render();
      }

      function validateGuess(guess) {
        return /^\d{7}$/.test(guess);
      }

      function scoreGuess(guess, answer) {
        // Count-aware duplicate handling:
        // 1) Exact position matches are green.
        // 2) Remaining unmatched answer digits are counted.
        // 3) Unmatched guess digits are yellow only if a remaining count exists.
        const result = Array(DIGITS).fill("gray");
        const remainingCounts = {};

        for (let i = 0; i < DIGITS; i += 1) {
          if (guess[i] === answer[i]) {
            result[i] = "green";
            continue;
          }
          const answerDigit = answer[i];
          remainingCounts[answerDigit] =
            (remainingCounts[answerDigit] || 0) + 1;
        }

        for (let i = 0; i < DIGITS; i += 1) {
          if (result[i] !== "gray") {
            continue;
          }
          const guessDigit = guess[i];
          if (remainingCounts[guessDigit] > 0) {
            result[i] = "yellow";
            remainingCounts[guessDigit] -= 1;
          }
        }

        return result;
      }

      function render() {
        boardEl.innerHTML = "";

        for (let row = 0; row < MAX_GUESSES; row += 1) {
          const rowEl = document.createElement("div");
          rowEl.className = "row";

          const guessObj = guesses[row];
          const digits = guessObj ? guessObj.value.split("") : [];

          for (let col = 0; col < DIGITS; col += 1) {
            const tile = document.createElement("div");
            tile.className = "tile";

            if (digits[col] !== undefined) {
              tile.textContent = digits[col];
              tile.classList.add("filled");
              tile.classList.add(guessObj.colors[col]);
            }

            rowEl.appendChild(tile);
          }

          boardEl.appendChild(rowEl);
        }
      }

      function submitGuess() {
        if (gameOver) {
          return;
        }

        const guess = inputEl.value.trim();

        if (!validateGuess(guess)) {
          setMessage("Enter exactly 7 digits (0-9).");
          return;
        }

        if (guesses.length >= MAX_GUESSES) {
          return;
        }

        const colors = scoreGuess(guess, secret);
        guesses.push({ value: guess, colors });
        render();

        if (guess === secret) {
          gameOver = true;
          inputEl.disabled = true;
          submitBtn.disabled = true;
          setMessage("");
          showResultModal({
            title: "You Win!",
            resultText: `You guessed ${secret} it in ${guesses.length}/${MAX_GUESSES} tries!`,
            showShare: true,
          });
          return;
        }

        if (guesses.length === MAX_GUESSES) {
          gameOver = true;
          inputEl.disabled = true;
          submitBtn.disabled = true;
          setMessage("");
          showResultModal({
            title: "Out of Guesses",
            resultText: `The answer was ${secret}.`,
            showShare: false,
          });
          return;
        }

        setMessage(`${MAX_GUESSES - guesses.length} guesses left.`);
        inputEl.value = "";
        inputEl.focus();
      }

      submitBtn.addEventListener("click", submitGuess);
      newBtn.addEventListener("click", initGame);
      shareRedditBtn.addEventListener("click", () => {
        const shareText = getShareMessage();
        const redditUrl = `https://www.reddit.com/submit?title=${encodeURIComponent(shareText)}&text=${encodeURIComponent(shareText)}`;
        window.open(redditUrl, "_blank", "noopener,noreferrer");
      });
      shareBlueskyBtn.addEventListener("click", () => {
        const shareText = getShareMessage();
        const blueskyUrl = `https://bsky.app/intent/compose?text=${encodeURIComponent(shareText)}`;
        window.open(blueskyUrl, "_blank", "noopener,noreferrer");
      });
      shareTwitterBtn.addEventListener("click", () => {
        const shareText = getShareMessage();
        const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
        window.open(twitterUrl, "_blank", "noopener,noreferrer");
      });
      copyShareBtn.addEventListener("click", async () => {
        const shareText = getShareMessage();
        try {
          await navigator.clipboard.writeText(shareText);
          modalShareStatusEl.textContent = "Result copied to clipboard.";
        } catch {
          modalShareStatusEl.textContent = "Could not copy automatically.";
          window.prompt("Copy your result:", shareText);
        }
      });
      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          submitGuess();
        }
      });

      initGame();
    </script>
  </body>
</html>
